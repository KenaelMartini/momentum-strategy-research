# Phase 3 fast drawdown grid — Train1 only.

runs:
  - name: p3_fastdd_baseline_off
    config_overrides:
      ED_MULTI_SIGNAL_VALUE_WEIGHT: 0.15
      ED_TURNOVER_CAP_PER_REBALANCE_FRACTION: 0.6
      ED_SIGNAL_RISK_ADJUST_ENABLED: true
      ED_SIGNAL_HALF_LIFE_REBALANCES: 0
      ED_SIGNAL_DECAY_RESET_WHEN_FLAT: true
      FAST_DRAWDOWN_CUT_ENABLED: false
      FAST_DRAWDOWN_CUT_ONLY_UNDER_STRESS: true

  - name: p3_fastdd_on_005_w10_stress_only
