# Phase 4 defensive-flat grid — Train1 only.

runs:
  - name: p4_dflat_off
    config_overrides:
      ED_MULTI_SIGNAL_VALUE_WEIGHT: 0.15
      ED_TURNOVER_CAP_PER_REBALANCE_FRACTION: 0.6
      ED_SIGNAL_RISK_ADJUST_ENABLED: true
      ED_SIGNAL_HALF_LIFE_REBALANCES: 0
      ED_SIGNAL_DECAY_RESET_WHEN_FLAT: true
      FAST_DRAWDOWN_CUT_ENABLED: false
      DEFENSIVE_FLAT_ENABLED: false

  - name: p4_dflat_on_default
    config_overrides:
      ED_MULTI_SIGNAL_VALUE_WEIGHT: 0.15
      ED_TURNOVER_CAP_PER_REBALANCE_FRACTION: 0.6
      ED_SIGNAL_RISK_ADJUST_ENABLED: true
      ED_SIGNAL_HALF_LIFE_REBALANCES: 0
      ED_SIGNAL_DECAY_RESET_WHEN_FLAT: true
      FAST_DRAWDOWN_CUT_ENABLED: false
      DEFENSIVE_FLAT_ENABLED: true

  - name: p4_dflat_on_stricter_entry
    config_overrides:
      ED_MULTI_SIGNAL_VALUE_WEIGHT: 0.15
      ED_TURNOVER_CAP_PER_REBALANCE_FRACTION: 0.6
      ED_SIGNAL_RISK_ADJUST_ENABLED: true
      ED_SIGNAL_HALF_LIFE_REBALANCES: 0
      ED_SIGNAL_DECAY_RESET_WHEN_FLAT: true
      FAST_DRAWDOWN_CUT_ENABLED: false
      DEFENSIVE_FLAT_ENABLED: true
      DEFENSIVE_FLAT_ENTRY_MIN_CONSECUTIVE_DAYS: 5

  - name: p4_dflat_on_faster_reentry
    config_overrides:
      ED_MULTI_SIGNAL_VALUE_WEIGHT: 0.15
      ED_TURNOVER_CAP_PER_REBALANCE_FRACTION: 0.6
      ED_SIGNAL_RISK_ADJUST_ENABLED: true
      ED_SIGNAL_HALF_LIFE_REBALANCES: 0
      ED_SIGNAL_DECAY_RESET_WHEN_FLAT: true
      FAST_DRAWDOWN_CUT_ENABLED: false
      DEFENSIVE_FLAT_ENABLED: true
      DEFENSIVE_FLAT_REENTRY_EFFECTIVE_CONSECUTIVE: 1
