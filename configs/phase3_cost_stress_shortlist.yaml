# Stress coûts Phase 3 — shortlist vs baseline (signal value 0.15 gelé, Train 1).
# Exécution :
#   mstrat sensitivity-batch --presets configs/phase3_cost_stress_shortlist.yaml --start 2010-01-01 --end 2018-12-31 --output results/institutional/phase3_cost_stress

runs:
  - name: p3_baseline_cost_1_0
    stress_cost_mult: 1.0
    config_overrides:
      ED_MULTI_SIGNAL_VALUE_WEIGHT: 0.15
  - name: p3_baseline_cost_1_5
    stress_cost_mult: 1.5
    config_overrides:
      ED_MULTI_SIGNAL_VALUE_WEIGHT: 0.15
  - name: p3_baseline_cost_2_0
    stress_cost_mult: 2.0
    config_overrides:
      ED_MULTI_SIGNAL_VALUE_WEIGHT: 0.15

  - name: p3_cap060_cost_1_0
    stress_cost_mult: 1.0
    config_overrides:
      ED_MULTI_SIGNAL_VALUE_WEIGHT: 0.15
      ED_TURNOVER_CAP_PER_REBALANCE_FRACTION: 0.6
  - name: p3_cap060_cost_1_5
    stress_cost_mult: 1.5
    config_overrides:
      ED_MULTI_SIGNAL_VALUE_WEIGHT: 0.15
      ED_TURNOVER_CAP_PER_REBALANCE_FRACTION: 0.6
  - name: p3_cap060_cost_2_0
    stress_cost_mult: 2.0
    config_overrides:
      ED_MULTI_SIGNAL_VALUE_WEIGHT: 0.15
      ED_TURNOVER_CAP_PER_REBALANCE_FRACTION: 0.6

  - name: p3_cap050_cost_1_0
    stress_cost_mult: 1.0
    config_overrides:
      ED_MULTI_SIGNAL_VALUE_WEIGHT: 0.15
      ED_TURNOVER_CAP_PER_REBALANCE_FRACTION: 0.5
  - name: p3_cap050_cost_1_5
    stress_cost_mult: 1.5
    config_overrides:
      ED_MULTI_SIGNAL_VALUE_WEIGHT: 0.15
      ED_TURNOVER_CAP_PER_REBALANCE_FRACTION: 0.5
  - name: p3_cap050_cost_2_0
    stress_cost_mult: 2.0
    config_overrides:
      ED_MULTI_SIGNAL_VALUE_WEIGHT: 0.15
      ED_TURNOVER_CAP_PER_REBALANCE_FRACTION: 0.5
